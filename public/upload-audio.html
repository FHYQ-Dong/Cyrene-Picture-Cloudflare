<!DOCTYPE html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>昔涟 | 上传音频</title>
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="stylesheet" href="/styles.css" />
		<script
			src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit"
			async
			defer
		></script>
	</head>
	<body>
		<header class="site-header">
			<div class="site-header-inner container">
				<div class="site-title-wrap">
					<a class="site-title-link" href="/">
						<h1 data-site-title>昔涟</h1>
					</a>
					<div class="title-stripe"></div>
				</div>
				<nav class="header-actions">
					<a class="button-link" href="/">图片</a>
					<a class="button-link" href="/audio.html">音频</a>
					<a class="button-link" href="/upload.html">上传图片</a>
				</nav>
			</div>
		</header>

		<main class="container upload-page">
			<section class="card upload-card">
				<div class="upload-header">
					<h2>上传音频</h2>
					<p>仅支持单文件上传，标题必填。</p>
				</div>

				<div class="upload-form-grid">
					<label>
						上传者昵称
						<input
							id="uploaderNickname"
							type="text"
							maxlength="24"
							placeholder="输入你的昵称（不填默认为093）"
						/>
					</label>
					<label>
						音频标题（必填）
						<input
							id="audioTitle"
							type="text"
							maxlength="120"
							placeholder="例如：meme"
						/>
					</label>
					<label>
						选择音频
						<input
							id="fileInput"
							type="file"
							accept="audio/mpeg,audio/wav,audio/ogg,audio/mp4,audio/webm,audio/flac,audio/aac,audio/x-m4a,audio/opus"
						/>
					</label>
				</div>

				<div class="upload-tags-panel">
					<label>
						标签（可选）
						<select id="tagSelect">
							<option value="">从已有标签中选择</option>
						</select>
					</label>
					<div class="tag-create-row">
						<input
							id="newTagInput"
							type="text"
							maxlength="30"
							placeholder="输入新标签后回车或点击添加"
						/>
						<button id="addTagButton" type="button">
							添加标签
						</button>
					</div>
					<div id="selectedTags" class="selected-tags"></div>
				</div>

				<div class="upload-validation-box">
					<div id="turnstileWidget"></div>
					<small id="turnstileStatus"></small>
				</div>

				<button id="uploadButton" class="upload-primary-btn">
					上传音频
				</button>
				<div id="uploadSummary" class="upload-summary summary-pending">
					尚未开始上传
				</div>
			</section>
		</main>

		<script type="module" src="/upload-audio.js"></script>
	</body>
</html>
