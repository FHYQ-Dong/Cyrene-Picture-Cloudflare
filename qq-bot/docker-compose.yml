services:
  pmhq:
    image: linyuchen/pmhq:latest
    privileged: true
    environment:
      - ENABLE_HEADLESS=true
      - AUTO_LOGIN_QQ=3568147707
    networks:
      - app_network
    volumes:
      - qq_volume:/root/.config/QQ
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:13000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  llbot:
    image: linyuchen/llbot:latest
    ports:
      - "3080:3080"
      - "3001:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PMHQ_HOST=pmhq
      - WEBUI_PORT=3080
    networks:
      - app_network
    volumes:
      - qq_volume:/root/.config/QQ
      - ./llbot_config:/app/llbot/data:rw
    depends_on:
      - pmhq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "ps | grep '[n]ode'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  qq-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cyrene-qq-bot
    restart: unless-stopped
    depends_on:
      llbot:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - LLBOT_WS_URL=ws://llbot:3001
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app_network
    command: ["node", "src/main.js"]

volumes:
  qq_volume:

networks:
  app_network:
    driver: bridge
