name = "cyrene-picture-cloudflare"
compatibility_date = "2026-03-26"
pages_build_output_dir = "public"

[vars]
MAX_FILE_SIZE = "209715200"
MAX_VISITOR_UPLOAD_COUNT_DAILY = "500"
MAX_VISITOR_UPLOAD_BYTES_DAILY = "2147483648"
MAX_IP_UPLOAD_COUNT_DAILY = "1500"
MAX_IP_UPLOAD_BYTES_DAILY = "6442450944"
MAX_GLOBAL_UPLOAD_COUNT_DAILY = "10000"
MAX_GLOBAL_UPLOAD_BYTES_DAILY = "42949672960"
UPLOAD_RATE_LIMIT_PER_MIN_VISITOR = "60"
UPLOAD_RATE_LIMIT_PER_MIN_IP = "120"
UPLOAD_URL_TTL_SECONDS = "900"
R2_BUCKET_NAME = "cyrene-images"
PUBLIC_IMAGE_BASE_URL = "https://img.example.com"
TURNSTILE_ENFORCED = "true"
DEFAULT_UPLOADER_NICKNAME = "093"
UPLOADER_NICKNAME_MAX_LENGTH = "24"
THUMBNAIL_ENABLED = "true"
THUMBNAIL_WIDTH = "360"
THUMBNAIL_FORMAT = "webp"
THUMBNAIL_QUALITY = "80"
THUMBNAIL_GENERATOR = "disabled"
THUMBNAIL_RESIZE_BASE_URL = ""

[[d1_databases]]
binding = "DB"
database_name = "cyrene_meta"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[[r2_buckets]]
binding = "R2"
bucket_name = "cyrene-images"
preview_bucket_name = "cyrene-images-preview"
